name: DB Update

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-db:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build malfuse-db
        run: GONOSUMCHECK=* go build -o malfuse-db ./cmd/malfuse-db/

      - name: Update database
        run: |
          ./malfuse-db --mode direct --db malfuse.db

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add malfuse.db
          if git diff --staged --quiet; then
            echo "No DB changes"
          else
            git commit -m "db: auto-update from ossf/malicious-packages"
            git push
          fi
